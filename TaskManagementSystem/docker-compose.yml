version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskmanagement-postgres
    environment:
      POSTGRES_DB: Tasks
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d Tasks"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskmanagement-api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:80
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=Tasks;Username=postgres;Password=1
      - JwtSettings__SecretKey=your-super-secret-key-with-at-least-32-characters-long
      - JwtSettings__Issuer=TaskManagementSystem
      - JwtSettings__Audience=TaskManagementSystemClient
      - JwtSettings__ExpirationHours=24
    ports:
      - "8080:80"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    
    command: >
      sh -c "sleep 5 && dotnet TaskManagementSystem.dll"

volumes:
  postgres_data: